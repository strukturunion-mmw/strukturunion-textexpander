name: Build macOS App

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build (debug, native arch) — compile check
        run: swift build -c debug

      - name: Build distributable app bundle (universal, ad-hoc signed)
        run: ./scripts/build.sh

      - name: Zip the app
        run: |
          cd build
          ditto -c -k --keepParent "StrukturExpander.app" "StrukturExpander.zip"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: StrukturExpander-app
          path: build/StrukturExpander.zip
          if-no-files-found: error
